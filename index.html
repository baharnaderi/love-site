<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Mohammadreza</title>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

    *{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Vazirmatn',sans-serif;

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

background:
radial-gradient(circle at top,#18304d 0%,#07111d 40%,#02050a 100%);

color:white;

position:relative;

}

/* ماه */

.moon{

position:absolute;

top:60px;

right:20px;

width:180px;

height:180px;

border-radius:50%;

background:radial-gradient(circle,#fffdf3,#f7f0bf,#d8d3aa);

box-shadow:

0 0 40px rgba(255,255,220,.8),

0 0 90px rgba(255,255,220,.4),

0 0 150px rgba(255,255,220,.25);

z-index:1;

animation:moonFloat 6s ease-in-out infinite;

}

@keyframes moonFloat{

0%,100%{

transform:translateY(0px);

}

50%{

transform:translateY(-12px);

}

}

/* ستاره ها */

#stars{

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

background-image:

radial-gradient(white 1px,transparent 1px),

radial-gradient(white 1px,transparent 1px),

radial-gradient(#fff 1px,transparent 1px);

background-size:

180px 180px,

250px 250px,

320px 320px;

background-position:

0 0,

50px 90px,

120px 30px;

opacity:.85;

animation:stars 5s ease-in-out infinite alternate;

}

@keyframes stars{

from{

opacity:.45;

}

to{

opacity:1;

}

}
        /* ========================= */
/* Hero */
/* ========================= */

.hero{

position:relative;

z-index:5;

width:90%;

max-width:900px;

padding:60px;

border-radius:35px;

text-align:center;

background:rgba(255,255,255,.06);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

box-shadow:

0 0 40px rgba(255,255,255,.05),

0 20px 60px rgba(0,0,0,.45);

animation:fadeUp 1.8s ease;

}

/* متن های اول */

.topText{

font-size:22px;

font-weight:300;

line-height:2;

opacity:.9;

margin-bottom:8px;

}

.heart{

color:#ffe6ef;

font-weight:600;

}

/* عنوان */

.hero h1{

margin-top:35px;

font-size:72px;

line-height:1.2;

font-weight:700;

letter-spacing:2px;

text-shadow:

0 0 20px rgba(255,255,255,.25);

}

/* زیر عنوان */

.subtitle{

margin-top:18px;

font-size:24px;

opacity:.85;

}

/* دکمه */

#startBtn{

margin-top:55px;

padding:18px 55px;

border:none;

border-radius:60px;

font-size:22px;

font-family:'Vazirmatn',sans-serif;

cursor:pointer;

background:linear-gradient(45deg,#ffffff,#f7e8ff);

color:#222;

font-weight:700;

transition:.35s;

box-shadow:

0 0 25px rgba(255,255,255,.35);

}

#startBtn:hover{

transform:translateY(-6px) scale(1.05);

box-shadow:

0 0 40px rgba(255,255,255,.6);

}

/* انیمیشن ورود */

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(70px);

}

to{

opacity:1;

transform:translateY(0);

}

}
        /* ========================= */
/* Glow Effects */
/* ========================= */

body::before{

content:"";

position:absolute;

top:-250px;

left:-250px;

width:500px;

height:500px;

border-radius:50%;

background:rgba(0,170,255,.10);

filter:blur(120px);

animation:floatLight1 12s ease-in-out infinite;

}

body::after{

content:"";

position:absolute;

bottom:-250px;

right:-250px;

width:500px;

height:500px;

border-radius:50%;

background:rgba(255,255,255,.08);

filter:blur(120px);

animation:floatLight2 14s ease-in-out infinite;

}

@keyframes floatLight1{

0%,100%{

transform:translate(0,0);

}

50%{

transform:translate(80px,60px);

}

}

@keyframes floatLight2{

0%,100%{

transform:translate(0,0);

}

50%{

transform:translate(-80px,-50px);

}

}

/* متن انتخاب نشود */

::selection{

background:white;

color:black;

}

/* واکنش‌گرا */

@media(max-width:768px){

.hero{

padding:35px;

}

.hero h1{

font-size:46px;

}

.topText{

font-size:18px;

}

.subtitle{

font-size:18px;

}

#startBtn{

font-size:18px;

padding:15px 35px;

}

.moon{

width:120px;

height:120px;

top:30px;

right:30px;

}

}
        /* ========================= */
/* Real Stars */
/* ========================= */

.star{

position:absolute;

width:2px;

height:2px;

background:white;

border-radius:50%;

box-shadow:

0 0 6px white,

0 0 12px white;

animation:twinkle linear infinite;

}

@keyframes twinkle{

0%{

opacity:.15;

transform:scale(.4);

}

50%{

opacity:1;

transform:scale(1.8);

}

100%{

opacity:.15;

transform:scale(.4);

}

}
        /* ========================= */
/* Shooting Star */
/* ========================= */

.shooting-star{

position:absolute;

top:-100px;

left:-200px;

width:180px;

height:2px;

background:linear-gradient(to right,white,transparent);

border-radius:50%;

transform:rotate(-25deg);

box-shadow:0 0 15px white;

opacity:0;

z-index:2;

animation:shoot 4s linear infinite;

}

@keyframes shoot{

0%{

opacity:0;

transform:translate(0,0) rotate(-25deg);

}

5%{

opacity:1;

}

30%{

opacity:1;

transform:translate(900px,500px) rotate(-25deg);

}

31%{

opacity:0;

}

100%{

opacity:0;

transform:translate(900px,500px) rotate(-25deg);

}

}
  .hero.hide{

opacity:0;

transform:scale(.95);

transition:1s;

pointer-events:none;

}  
        body.light{

background:
radial-gradient(circle at top,#2a4d73 0%,#07111d 45%,#02050a 100%);

transition:1.5s;

}

body.light .moon{

box-shadow:
0 0 80px rgba(255,255,220,.9),
0 0 140px rgba(255,255,220,.5),
0 0 200px rgba(255,255,220,.3);

}
 @keyframes floatUp{

0%{

transform:translateY(0);

opacity:0;

}

10%{

opacity:1;

}

100%{

transform:translateY(-800px);

opacity:0;

}

}

  #startBtn:focus,
#startBtn:active{
outline:none !important;
box-shadow:none !important;
}

button{
outline:none !important;
-webkit-tap-highlight-color: transparent;
}
        *{
outline:none !important;
}
    </style>

</head>

<body>

    <!-- ستاره ها -->
    <div id="stars"></div>
<div id="shooting-stars"></div>
    
    <!-- ماه -->
    <div class="moon"></div>

    <!-- صفحه شروع -->
    <section class="hero">

        <p class="topText">
            یه نفر...
        </p>

        <p class="topText">
            از چند صد کیلومتر اون‌طرف‌تر...
        </p>

        <p class="topText">
            با تمام قلبش...
        </p>

        <p class="topText heart">
            این هدیه رو فقط برای تو ساخته... 🤍
        </p>

        <h1>
            Happy Birthday
            <br>
            Mohammadreza
        </h1>

        <p class="subtitle">
            🌙 تولدت مبارک، ماه زمینی من...
        </p>

        <button id="startBtn">

            🤍 برای محمدرضا...

        </button>

    </section>

    <script>

    // این قسمت را فعلاً خالی بگذار
      const stars = document.getElementById("stars");

for(let i=0;i<180;i++){

const star=document.createElement("span");

star.className="star";

star.style.left=Math.random()*100+"%";

star.style.top=Math.random()*100+"%";

star.style.animationDelay=Math.random()*5+"s";

star.style.animationDuration=(2+Math.random()*3)+"s";

stars.appendChild(star);

}
        const shooting=document.getElementById("shooting-stars");

const meteor=document.createElement("div");

meteor.className="shooting-star";

shooting.appendChild(meteor);
        const startBtn = document.getElementById("startBtn");
const hero = document.querySelector(".hero");

startBtn.addEventListener("click",()=>{

hero.classList.add("hide");

});
        startBtn.addEventListener("click",()=>{

hero.classList.add("hide");

document.body.classList.add("light");

});
        function createHeart(){

const heart=document.createElement("div");

heart.innerHTML="🤍";

heart.style.position="absolute";

heart.style.left=Math.random()*100+"%";

heart.style.bottom="-20px";

heart.style.fontSize=(16+Math.random()*20)+"px";

heart.style.opacity="0.8";

heart.style.animation="floatUp 5s linear forwards";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},5000);

}

setInterval(createHeart,1200);
    </script>

</body>

</html>
