<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Mohammadreza</title>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

    *{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Vazirmatn',sans-serif;

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

background:
radial-gradient(circle at top,#18304d 0%,#07111d 40%,#02050a 100%);

color:white;

position:relative;

}

/* ماه */

.moon{

position:absolute;

top:60px;

right:80px;

width:180px;

height:180px;

border-radius:50%;

background:radial-gradient(circle,#fffdf3,#f7f0bf,#d8d3aa);

box-shadow:

0 0 40px rgba(255,255,220,.8),

0 0 90px rgba(255,255,220,.4),

0 0 150px rgba(255,255,220,.25);

z-index:1;

animation:moonFloat 6s ease-in-out infinite;

}

@keyframes moonFloat{

0%,100%{

transform:translateY(0px);

}

50%{

transform:translateY(-12px);

}

}

/* ستاره ها */

#stars{

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

background-image:

radial-gradient(white 1px,transparent 1px),

radial-gradient(white 1px,transparent 1px),

radial-gradient(#fff 1px,transparent 1px);

background-size:

180px 180px,

250px 250px,

320px 320px;

background-position:

0 0,

50px 90px,

120px 30px;

opacity:.85;

animation:stars 5s ease-in-out infinite alternate;

}

@keyframes stars{

from{

opacity:.45;

}

to{

opacity:1;

}

}
    
    </style>

</head>

<body>

    <!-- ستاره ها -->
    <div id="stars"></div>

    <!-- ماه -->
    <div class="moon"></div>

    <!-- صفحه شروع -->
    <section class="hero">

        <p class="topText">
            یه نفر...
        </p>

        <p class="topText">
            از چند صد کیلومتر اون‌طرف‌تر...
        </p>

        <p class="topText">
            با تمام قلبش...
        </p>

        <p class="topText heart">
            این هدیه رو فقط برای تو ساخته... 🤍
        </p>

        <h1>
            Happy Birthday
            <br>
            Mohammadreza
        </h1>

        <p class="subtitle">
            🌙 تولدت مبارک، ماه زمینی من...
        </p>

        <button id="startBtn">

            🤍 برای محمدرضا...

        </button>

    </section>

    <script>

    // این قسمت را فعلاً خالی بگذار

    </script>

</body>

</html>
